<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>石库门漫游指南 · 你的专属景区推荐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8dfd3 100%);
            min-height: 100vh;
            padding: 24px 20px 60px;
            color: #2c2418;
            line-height: 1.6;  /* 全局行高增加 */
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 32px 28px;  /* 内边距增加 */
            margin-bottom: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(210, 180, 140, 0.3);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #b87c4f, #6b4c2c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .subhead {
            color: #7a5a3a;
            border-left: 3px solid #c9aa7b;
            padding-left: 14px;
            margin-bottom: 24px;
            font-size: 1rem;
            line-height: 1.5;
        }
        .intro-text {
            line-height: 1.7;
            margin-bottom: 28px;
            font-size: 1rem;
            color: #4a3a2a;
        }
        .progress-bar {
            background: #e2d8cd;
            border-radius: 40px;
            height: 8px;
            margin: 24px 0 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #b87c4f;
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .question-item {
            margin-bottom: 32px;
            border-bottom: 1px solid #ede3d6;
            padding-bottom: 24px;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 18px;
            font-size: 1.08rem;
            color: #3e2a1f;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
        }
        .opt-btn {
            flex: 1;
            min-width: 65px;
            background: #f7f2ea;
            border: 1px solid #ddd0be;
            border-radius: 60px;
            padding: 12px 0;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #4a3520;
            line-height: 1.3;
        }
        .opt-btn.selected {
            background: #b87c4f;
            border-color: #b87c4f;
            color: white;
            box-shadow: 0 4px 8px rgba(184, 124, 79, 0.3);
        }
        .opt-label {
            font-size: 0.7rem;
            display: block;
            color: #9b7a5a;
            margin-top: 5px;
            line-height: 1.3;
        }
        .opt-btn.selected .opt-label {
            color: rgba(255,255,240,0.9);
        }
        button {
            background: #6b4c2c;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 24px;
            line-height: 1.4;
        }
        button:hover {
            background: #8b623f;
            transform: translateY(-2px);
        }
        .result-card {
            text-align: left;
        }
        .type-badge {
            display: inline-block;
            background: #e7d9cc;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            margin: 16px 0 20px;
            color: #5c3f23;
            line-height: 1.4;
        }
        .rec-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 28px 0 16px;
            color: #4f3a24;
            line-height: 1.3;
        }
        .spot {
            background: #fef9f2;
            border-left: 5px solid #c9aa7b;
            padding: 20px 22px;
            margin: 24px 0;
            border-radius: 24px;
        }
        .spot h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .spot p {
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .mode-tag {
            font-size: 0.8rem;
            background: #e1d1c0;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 14px;
            line-height: 1.4;
        }
        .btn-reset {
            background: #d9c6b0;
            color: #4a2f18;
            margin-top: 28px;
        }
        .btn-reset:hover {
            background: #cbb68f;
        }
        .ambiguous-notice {
            background: #f0ebe2;
            padding: 16px 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 0.95rem;
            border-left: 3px solid #c9aa7b;
            line-height: 1.5;
        }
        .mode-intro-item {
            margin-bottom: 24px;
            border-left: 3px solid #c9aa7b;
            padding-left: 18px;
        }
        .mode-intro-item strong {
            font-size: 1.08rem;
            line-height: 1.4;
        }
        .mode-intro-item p {
            margin-top: 8px;
            font-size: 0.92rem;
            line-height: 1.55;
            color: #5a4632;
        }
        .mode-examples {
            font-size: 0.88rem;
            color: #8b6946;
            display: block;
            margin-top: 6px;
            line-height: 1.4;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #8f765a;
            margin-top: 40px;
            line-height: 1.5;
        }
        @media (max-width: 550px) {
            .options { gap: 8px; }
            .opt-btn { font-size: 0.85rem; padding: 10px 0; min-width: 55px; }
            .card { padding: 24px 20px; }
            .rec-title { font-size: 1.4rem; }
            .spot h3 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="introCard">
        <h1>🏮 石库门漫游指南</h1>
        <div class="subhead">守“沪”旧里，协共新生</div>
        <p class="intro-text">根据游客满意度调研成果，我们发现不同游客对石库门的期待截然不同。完成下面8道简短的测试，我们将为您匹配最契合你的石库门街区，并推荐专属游览方式。</p>
        <button id="startBtn">✨ 开始测试 ✨</button>
    </div>

    <div id="quizPanel" style="display: none;">
        <div class="card">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="questionsContainer"></div>
        </div>
    </div>

    <div id="resultPanel" style="display: none;">
        <div class="card result-card">
            <div style="font-size: 2rem;">🏷️</div>
            <h2 id="resultTypeName" style="line-height: 1.3;">——</h2>
            <div id="resultTypeBadge" class="type-badge">——</div>
            <p id="resultDesc" style="margin: 16px 0; line-height: 1.7;"></p>
            <div id="ambiguousBox" style="display: none;" class="ambiguous-notice"></div>
            <div class="rec-title">🎯 为您推荐 · 理想石库门街区</div>
            <div id="recommendSpot"></div>
            <div class="rec-title" style="margin-top: 32px;">🏛️ 三种石库门改造模式</div>
            <p style="margin-bottom: 16px; font-size:0.92rem; line-height:1.5;">了解不同类型街区的独特魅力👇</p>
            <div id="modeIntro"></div>
            <button id="resetBtn" class="btn-reset">🔄 重新测试</button>
        </div>
    </div>
    <footer>基于《守"沪"旧里，焕新游踪》调研成果 · 潜在游客四象限模型</footer>
</div>

<script>
    // 题目
    const questions = [
        { text: "石库门的历史风貌与独特文化内涵对我有很强吸引力，会提升到访意愿。", key: "culture" },
        { text: "石库门是上海独特的城市文化符号，游览它能让我更好地理解这座城市。", key: "culture" },
        { text: "我在社交平台看到的石库门打卡照片/视频很吸引我，想去同款场景。", key: "heat" },
        { text: "看到石库门在社交平台的高打卡量、热门标签，会让我觉得它值得一去。", key: "heat" },
        { text: "文旅局/景区官方推荐或旅游网站高分评价，会让我更放心地将它列入行程。", key: "wordmouth" },
        { text: "他人分享的正面体验/朋友推荐，会明显提升我前往的意愿。", key: "wordmouth" },
        { text: "石库门保留的老上海元素让我对这座城市的历史产生好奇，这种时空感很吸引我。", key: "emotion" },
        { text: "游览石库门能满足我体验当地文化的期待，感觉更贴近真实的上海。", key: "emotion" }
    ];

    let userAnswers = new Array(questions.length).fill(null);
    let currentPage = 0;
    const ITEMS_PER_PAGE = 4;
    const totalPages = Math.ceil(questions.length / ITEMS_PER_PAGE);

    function computeType() {
        if (userAnswers.some(a => a === null)) return { main: null, ambiguous: null };
        
        const cultureScore = (userAnswers[0] + userAnswers[1]) / 2;
        const heatScore = (userAnswers[2] + userAnswers[3]) / 2;
        const wordmouthScore = (userAnswers[4] + userAnswers[5]) / 2;
        const emotionScore = (userAnswers[6] + userAnswers[7]) / 2;
        
        const HIGH = 3.7;
        const LOW = 2.5;
        
        let isDeepCulture = (cultureScore >= HIGH && heatScore >= HIGH);
        let isWordEmotion = (wordmouthScore >= HIGH && emotionScore >= HIGH);
        let isLowAwareness = (heatScore <= LOW && wordmouthScore <= LOW && emotionScore <= LOW);
        
        let matched = [];
        if (isDeepCulture) matched.push("deep_culture");
        if (isWordEmotion) matched.push("wordmouth_emotion");
        if (isLowAwareness) matched.push("low_awareness");
        if (!isDeepCulture && !isWordEmotion && !isLowAwareness) matched.push("demand_fit");
        
        if (matched.length === 1) return { main: matched[0], ambiguous: null };
        if (matched.length >= 2) return { main: matched[0], ambiguous: matched[1] };
        return { main: "demand_fit", ambiguous: null };
    }
    
    function getTypeInfo(typeId) {
        const types = {
            deep_culture: { name: "深度文化认同型", desc: "您对历史底蕴、建筑原真性、海派文脉有强烈的向往，渴望在游览中触摸真实的上海记忆。文化沉浸是您的核心驱动力。", badge: "📜 文化寻踪者" },
            wordmouth_emotion: { name: "口碑情感驱动型", desc: "您容易被好口碑、朋友推荐和社交平台的优质内容打动，喜欢有温度、有故事的氛围。情感共鸣决定了您的出行选择。", badge: "💬 共鸣探索派" },
            demand_fit: { name: "生活场景消费型", desc: "您追求综合体验的平衡：交通便利、餐饮舒适、环境整洁、适度文化氛围。希望街区兼顾生活感和游玩品质。", badge: "⚖️ 品质生活家" },
            low_awareness: { name: "低感知低意愿型", desc: "您对石库门暂不了解或兴趣一般，但存在潜在触发点——一旦匹配到您关心的要素，可能成为忠实访客。", badge: "🌱 待唤醒·潜在客群" }
        };
        return types[typeId] || types.demand_fit;
    }
    
    function getRecommend(typeId, ambiguousId) {
        if ((typeId === "deep_culture" && ambiguousId === "wordmouth_emotion") ||
            (typeId === "wordmouth_emotion" && ambiguousId === "deep_culture")) {
            return { spotName: "张园 · 田子坊 联动体验", intro: "高端文化深度 + 市井口碑热度", features: "白天在张园感受石库门建筑精华与高端文化展览，傍晚到田子坊穿弄堂、品小吃、淘文创。两种模式一次体验。", matchReason: "您同时追求文化深度和口碑氛围，推荐组合游览。" };
        }
        if ((typeId === "demand_fit" && ambiguousId === "low_awareness") ||
            (typeId === "low_awareness" && ambiguousId === "demand_fit")) {
            return { spotName: "鸿寿坊 · 今潮8弄", intro: "社区友好型入门体验", features: "鸿寿坊食集丰富、性价比高；今潮8弄艺术氛围轻松。两者交通便利、体验门槛低。", matchReason: "从这两处社区友好型街区开始探索。" };
        }
        
        const recMap = {
            deep_culture: { spotName: "张园 · 新天地", intro: "整体置换·高端开发型 | 海派建筑博物馆与时尚地标", features: "完整保留了百年石库门里弄肌理，国际品牌与历史建筑交融。设有石库门主题展览、建筑导览，适合深度品味海派文化。", matchReason: "建筑原真性高，文化展示丰富，可沉浸式感受上海百年变迁。" },
            wordmouth_emotion: { spotName: "田子坊 · 今潮8弄", intro: "自发聚集·有机更新型 + 局部修缮·社区共生型", features: "田子坊：窄巷烟火、文创小店、本地小吃，口碑极佳的市井体验；今潮8弄：艺术市集、亲子友好、海派新潮活动，社交平台高热度。", matchReason: "朋友推荐、社交打卡氛围浓厚，能快速获得情感共鸣和分享欲。" },
            demand_fit: { spotName: "鸿寿坊 · 新天地", intro: "局部修缮·社区共生型 + 整体置换型（平衡体验）", features: "鸿寿坊：「社区会客厅」，食集丰富、交通便利、性价比高；新天地公共空间开阔，设施完善，满足品质需求。", matchReason: "交通便利、餐饮选择多、环境整洁，兼顾生活感与游览舒适度。" },
            low_awareness: { spotName: "鸿寿坊 · 今潮8弄", intro: "友好入门级石库门街区", features: "鸿寿坊社区商业成熟，轻松无压力；今潮8弄艺术氛围活泼，常有市集活动。二者都适合初次探访。", matchReason: "体验门槛低，容易建立好感，逐步发现石库门魅力。" }
        };
        return recMap[typeId] || recMap.demand_fit;
    }
    
function getModes() {
    return [
        { 
            name: "🏛️ 整体置换·高端开发型", 
            examples: "新天地 · 张园", 
            desc: "完整保留建筑外观，内部功能置换为高端商业，空间开阔规整，适合追求品质与建筑美学的游客。",
            images: [
                "https://img2.baidu.com/it/u=3080579136,56867293&fm=253&fmt=auto&app=138&f=JPEG?w=750&h=500",
                "https://img1.baidu.com/it/u=781039542,293136520&fm=253&fmt=auto&app=120&f=JPEG?w=750&h=500"
            ]
        },
        { 
            name: "🎨 自发聚集·有机更新型", 
            examples: "田子坊", 
            desc: "保留弄堂格局与商居共生生态，以文创小店、本地小吃为主，烟火气浓，适合沉浸式漫游。",
            images: [
                "https://img2.baidu.com/it/u=30382054,2847129121&fm=253&fmt=auto&app=138&f=JPEG?w=574&h=356",
                "https://img1.baidu.com/it/u=1051581571,1040188895&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=333"
            ]
        },
        { 
            name: "🌿 局部修缮·社区共生型", 
            examples: "今潮8弄 · 鸿寿坊", 
            desc: "修旧如旧，植入艺术与社区商业，氛围松弛，兼顾本地居民与游客，适合休闲社交。",
            images: [
                "https://img0.baidu.com/it/u=1920124073,2019954107&fm=253&fmt=auto&app=120&f=JPEG?w=775&h=500",
                "https://img2.baidu.com/it/u=1486317557,2162555080&fm=253&fmt=auto&app=138&f=JPEG?w=784&h=500"
            ]
        }
    ];
}
    
    function showResult() {
        const { main, ambiguous } = computeType();
        if (!main) { alert("请完成全部题目"); return; }
        
        const mainInfo = getTypeInfo(main);
        let typeName = mainInfo.name;
        let badge = mainInfo.badge;
        let desc = mainInfo.desc;
        let recommend = getRecommend(main, ambiguous);
        
        if (ambiguous) {
            const ambInfo = getTypeInfo(ambiguous);
            typeName = mainInfo.name + " / " + ambInfo.name;
            badge = "🔀 融合型 · " + mainInfo.badge + " + " + ambInfo.badge;
            desc = "您既像是「" + mainInfo.name + "」，又像是「" + ambInfo.name + "」。\n\n" + mainInfo.desc + "\n\n同时也契合：" + ambInfo.desc;
            document.getElementById('ambiguousBox').style.display = 'block';
            document.getElementById('ambiguousBox').innerHTML = '🔍 您的测试结果处于边界区域，同时具备两种类型的特征。下面的推荐为您融合了两类偏好。';
        } else {
            document.getElementById('ambiguousBox').style.display = 'none';
        }
        
        document.getElementById('resultTypeName').innerHTML = typeName;
        document.getElementById('resultTypeBadge').innerHTML = badge;
        document.getElementById('resultDesc').innerHTML = desc.replace(/\n/g, '<br>');
        
        document.getElementById('recommendSpot').innerHTML = `
            <div class="spot">
                <div class="mode-tag">🎯 专属推荐</div>
                <h3>📍 ${recommend.spotName}</h3>
                <p style="margin:8px 0; font-weight:500; line-height:1.5;">${recommend.intro}</p>
                <p style="line-height:1.6;">✨ ${recommend.features}</p>
                <p style="margin-top:14px; background:#f4ede5; padding:12px 16px; border-radius:20px; line-height:1.5;">💡 匹配理由：${recommend.matchReason}</p>
            </div>
        `;
        
let modesHtml = '';
getModes().forEach(m => {
    modesHtml += `<div class="mode-intro-item" style="margin-bottom: 32px;">
        <strong style="font-size:1.05rem;">${m.name}</strong>
        <span class="mode-examples" style="font-size:0.85rem; color:#8b6946; display:block; margin-top:4px;">${m.examples}</span>
        <p style="margin-top: 8px; font-size:0.92rem; line-height:1.5;">${m.desc}</p>
        <div style="display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap;">
${m.images.map(imgUrl => `<img src="${imgUrl}" style="width: calc(50% - 6px); border-radius: 16px; max-height: 200px; object-fit: contain; background: #f0ebe2;" loading="lazy" onerror="this.style.display='none'">`).join('')}
        </div>
    </div>`;
});
document.getElementById('modeIntro').innerHTML = modesHtml;
        
        document.getElementById('introCard').style.display = 'none';
        document.getElementById('quizPanel').style.display = 'none';
        document.getElementById('resultPanel').style.display = 'block';
        window.scrollTo({ top: 0 });
    }
    
    function renderQuestions() {
        const start = currentPage * ITEMS_PER_PAGE;
        const end = Math.min(start + ITEMS_PER_PAGE, questions.length);
        let html = '';
        for (let i = start; i < end; i++) {
            const val = userAnswers[i];
            html += `<div class="question-item">
                <div class="question-text">${i+1}. ${questions[i].text}</div>
                <div class="options" data-qidx="${i}">
                    ${[1,2,3,4,5].map(v => `
                        <div class="opt-btn ${val === v ? 'selected' : ''}" data-val="${v}">
                            ${v}<span class="opt-label">${v===1?'完全不同意':v===2?'不太同意':v===3?'一般':v===4?'比较同意':'完全同意'}</span>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }
        let navHtml = '<div style="display: flex; justify-content: space-between; gap: 12px; margin-top: 16px;">';
        if (currentPage > 0) navHtml += `<button type="button" id="prevPageBtn" style="background:#b9a58b; width:auto;">← 上一页</button>`;
        if (currentPage < totalPages - 1) navHtml += `<button type="button" id="nextPageBtn" style="background:#b9a58b; width:auto;">下一页 →</button>`;
        else navHtml += `<button type="button" id="finalSubmitBtn" style="background:#6b4c2c;">完成测试，查看推荐 ✨</button>`;
        navHtml += '</div>';
        document.getElementById('questionsContainer').innerHTML = html + navHtml;
        
        document.querySelectorAll('.options').forEach(optDiv => {
            const qIdx = parseInt(optDiv.dataset.qidx);
            optDiv.querySelectorAll('.opt-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = parseInt(btn.dataset.val);
                    userAnswers[qIdx] = val;
                    optDiv.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    updateProgress();
                });
            });
        });
        
        document.getElementById('prevPageBtn')?.addEventListener('click', () => { if (currentPage > 0) { currentPage--; renderQuestions(); } });
        document.getElementById('nextPageBtn')?.addEventListener('click', () => {
            const startIdx = currentPage * ITEMS_PER_PAGE;
            const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, questions.length);
            for (let i = startIdx; i < endIdx; i++) if (userAnswers[i] === null) { alert("请先完成本页所有题目～"); return; }
            if (currentPage < totalPages - 1) { currentPage++; renderQuestions(); }
        });
        document.getElementById('finalSubmitBtn')?.addEventListener('click', () => {
            const startIdx = currentPage * ITEMS_PER_PAGE;
            const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, questions.length);
            for (let i = startIdx; i < endIdx; i++) if (userAnswers[i] === null) { alert("请先完成本页所有题目～"); return; }
            showResult();
        });
        updateProgress();
    }
    
    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        document.getElementById('progressFill').style.width = (answered / questions.length * 100) + '%';
    }
    
    function resetTest() {
        userAnswers = new Array(questions.length).fill(null);
        currentPage = 0;
        document.getElementById('introCard').style.display = 'block';
        document.getElementById('quizPanel').style.display = 'none';
        document.getElementById('resultPanel').style.display = 'none';
    }
    
    document.getElementById('startBtn').addEventListener('click', () => {
        document.getElementById('introCard').style.display = 'none';
        document.getElementById('quizPanel').style.display = 'block';
        renderQuestions();
    });
    document.getElementById('resetBtn')?.addEventListener('click', resetTest);
    updateProgress();
</script>
</body>
</html>
